    body: |
      Sehr geehrter Herr Bellaerts,

      auf Empfehlung von Frau Dr. Karoline Werth (Beraterin fuer Familien-Governance) schreibe ich Ihnen wegen einer komplexen Konstellation, fuer die wir nach einem Strukturierungs-Tool suchen.

      Unser Unternehmen, ein Baustoff-Grosshandel mit 134 Mitarbeitern, ist seit der 4. Generation in Familienbesitz. Aktuell haben wir 7 Eigentuemer aus drei Familienzweigen — meine Schwester und ich, drei Cousins, ein Onkel und eine Tante. Im operativen Geschaeft sind nur ich (Geschaeftsfuehrer, 51) und mein Cousin Tilmann (Vertriebsleiter, 47). Die anderen 5 sind passive Gesellschafter.

      Die Herausforderung: Wir bereiten gerade den Uebergang in die 5. Generation vor. Aus der naechsten Generation sind aktuell 4 Personen in einem Alter (24-32 Jahre), in dem sie potenziell mitspielen koennen. Zwei davon arbeiten bereits in der Firma, zwei studieren noch.

      Was wir suchen: Ein Tool, in dem wir das "Familien-Unternehmens-Wissen" strukturieren koennen, in einer Weise, die auch fuer passive Gesellschafter nachvollziehbar ist (Reporting an die Familie) und gleichzeitig die naechste Generation in das implizite Wissen einfuehrt. Idealerweise mit Rollen-Sichten:

      - "Operative Sicht" fuer Geschaeftsfuehrung und Bereichsleiter (volle Tiefe)
      - "Familien-Sicht" fuer passive Gesellschafter (aggregierte, strategische Ebene)
      - "Nachfolger-Onboarding-Sicht" mit progressivem Tiefen-Aufbau

      Ist eine solche Differenzierung in Strategaize abbildbar? Falls ja, wuerde ich gerne ein Erstgespraech mit Ihnen vereinbaren — gerne auch im Rahmen einer Familien-Strategie-Sitzung im Juli.

