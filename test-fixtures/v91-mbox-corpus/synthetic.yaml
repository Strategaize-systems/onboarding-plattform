  - id: "025"
    expected_classification: valuable
    expected_pattern: "Vendor-Discussion Bedrock-Cost-Optimization (Haiku-vs-Sonnet Routing-Strategy, konkrete Token-Economics)"
    reasoning: "Konkrete technische Architektur-Entscheidung mit messbarer Cost-Wirkung. Direkt umsetzbares Pattern fuer V9.1 Pre-Filter und kuenftige Bedrock-Optimierungen."
    subject: "Re: Bedrock cost optimisation review — meine drei Empfehlungen"
    from: "j.weiss@bedrock-consulting.de"
    to: "immo@bellaerts.de"
    date: "2026-05-12"
    body: |
      Hi Immo,

      ich habe euren AWS-Bedrock-Usage der letzten 60 Tage analysiert. Drei konkrete Empfehlungen, gewichtet nach Cost-Impact.

      Empfehlung 1 — Pre-Filter mit Haiku vor Sonnet (groesster Hebel)

      Aktuell schickt ihr alle eingehenden Emails direkt an Claude Sonnet zur Pattern-Extraktion. Bei einem typischen Mix sind aber 60-70 Prozent der Emails nicht extraktionswuerdig (Newsletter, Notifications, Marketing). Mein Vorschlag: ein Haiku-Pre-Filter, der entscheidet "extraction-worthy ja/nein" und nur valuable Emails an Sonnet weiterleitet.

      Token-Economics:
      - Sonnet: ~3 USD pro 1 Mio Input-Tokens
      - Haiku: ~0.25 USD pro 1 Mio Input-Tokens
      - Pre-Filter-Prompt: ~400 Tokens pro Email
      - Klassifizierung 1000 Emails: Haiku ca. 0.10 USD, Sonnet ca. 1.20 USD

      Bei 60 Prozent Skip-Rate spart ihr ca. 65 Prozent der Sonnet-Kosten fuer die Klassifizierungs-Stufe. Bei eurem aktuellen Volumen waeren das geschaetzt 180-220 USD pro Monat.

      Empfehlung 2 — Prompt-Caching aggressiver nutzen

      Eure Sonnet-System-Prompts sind 4.200 Tokens. Bedrock unterstuetzt seit Q4-2025 Prompt-Caching mit 90 Prozent Rabatt auf gecachte Tokens. Wenn ihr den Cache richtig nutzt (System-Prompt cachen, dynamic content nicht), spart ihr nochmals ca. 35-40 Prozent.

      Empfehlung 3 — Output-Token-Limits enger setzen

      Eure aktuellen Sonnet-Calls haben max_tokens=4096. Tatsaechlich sind 85 Prozent der Antworten unter 1200 Tokens. Setzt max_tokens=1500 mit klarer Truncation-Strategy. Spart wenig Cost, aber reduziert Latenz spuerbar.

      Setzt ihr alle drei um, sehe ich realistische 45-50 Prozent Bedrock-Cost-Reduktion innerhalb von 4-6 Wochen.

      Gerne kurzes Follow-Up-Call.

      Beste Gruesse
      Jens Weiss

