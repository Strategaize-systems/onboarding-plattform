  - id: "019"
    expected_classification: valuable
    expected_pattern: "Customer-Inquiry SME-GF mit Geschwister-Konflikt-Hintergrund Nachfolge (psychologische Familienunternehmen-Dimension)"
    reasoning: "Beschreibt die emotional-relational Komponente der Nachfolge, die in einer Spec-Sammlung selten dokumentiert ist. Pattern wertvoll fuer Sales-Empathie und Produktentwicklung."
    subject: "Anfrage Erstgespraech — Nachfolge in der Familie schwierig"
    from: "a.berger@berger-textilien.de"
    to: "immo@bellaerts.de"
    date: "2026-05-02"
    body: |
      Sehr geehrter Herr Bellaerts,

      ich melde mich auf Empfehlung meines Steuerberaters, Dr. Eichinger, der mir Strategaize empfohlen hat. Ich beschreibe Ihnen kurz die Situation, damit Sie einschaetzen koennen, ob Ihr Ansatz fuer uns passt.

      Ich fuehre seit 22 Jahren ein Textil-Grosshandelsunternehmen mit 31 Mitarbeitern. Wir liefern an etwa 280 Stoff-Fachhaendler in Deutschland und Oesterreich. Mein juengerer Bruder, Christian, ist seit 9 Jahren in der Firma als kaufmaennischer Leiter taetig und wuerde die Firma uebernehmen.

      Soweit der einfache Teil. Der komplizierte Teil: Mein Bruder und ich haben sehr unterschiedliche Vorstellungen davon, wie die Kundenbeziehungen funktionieren. Ich pflege jeden grossen Kunden persoenlich, telefoniere mit jedem Inhaber mindestens viermal im Jahr, kenne die Familien, Kinder, Hochzeiten. Mein Bruder ist datengetriebener, will mit CRM-Daten und Analysen arbeiten.

      Beide Ansaetze haben ihre Berechtigung. Was uns aktuell trennt, ist meine Sorge, dass mein implizites Wissen — wer wann was braucht, welche Sondersituationen Toleranz erfordern, wo wir mit welchem Kunden 1990 angefangen haben — beim Uebergang verloren geht, und wir damit das wichtigste Asset des Unternehmens beschaedigen.

      Mein Bruder findet das in Teilen romantisierend.

      Koennen Sie sich vorstellen, dass Strategaize uns hilft, beide Sichtweisen produktiv zusammenzubringen? Falls ja, wuerde ich gerne ein Gespraech vereinbaren — gerne auch zu dritt mit meinem Bruder.

      Mit freundlichen Gruessen
      Andreas Berger
      Berger Textilien GmbH

