  - id: "039"
    expected_classification: valuable
    expected_pattern: "Customer-Feedback Bedrock-Pattern-Extraktion zu generisch (konkretes Prompt-Engineering-Feedback)"
    reasoning: "Konkretes Produkt-Feedback zur Qualitaet der Pattern-Extraktion. Direkt umsetzbar fuer Prompt-Engineering-Verbesserungen."
    subject: "Feedback Pattern-Extraktion — Vorschlaege sind zu generisch"
    from: "k.lang@lang-engineering.de"
    to: "immo@bellaerts.de"
    date: "2026-05-28"
    body: |
      Hallo Immo,

      mein Team hat in den letzten 4 Wochen 47 Pattern-Vorschlaege aus der KI-Analyse durchgesehen. Ich teile mein ehrliches Feedback, weil ich glaube, dass dies fuer euer Produkt wichtig ist.

      Stand der Dinge:

      Von 47 Vorschlaegen waren 8 hochwertig, 23 mittelmaessig brauchbar, 16 zu generisch. Die hochwertigen Vorschlaege betrafen alle sehr spezifische Kunden-Interaktionen oder konkrete Auftragsabwicklungs-Schritte. Die generischen Vorschlaege waren typischerweise auf der Meta-Ebene und lasen sich wie aus einem Lehrbuch fuer Mittelstaender — "Definieren Sie klare Kommunikationswege", "Etablieren Sie ein konsistentes Onboarding".

      Das Problem ist, dass die generischen Vorschlaege zwar nicht falsch sind, aber nicht das Wissen abbilden, das wir konkret in Strategaize haben wollen. Wir wollen unsere Eigenheiten dokumentieren, nicht ein generisches Beratungsbuch nacherzaehlen.

      Mein konkreter Vorschlag fuer das Prompt-Engineering:

      Die KI sollte nur dann Patterns vorschlagen, wenn sie aus den Quelldaten konkrete Belege heranziehen kann — Zitate, Namen, Beispiele. Ohne solche Verankerung sollte sie den Vorschlag zurueckhalten, statt zu generalisieren.

      Zweitens: Eine Bewertungs-Skala "konkretheits-grad 1-5" auf jedem Vorschlag. Vorschlaege mit Konkretheits-Grad unter 3 koennten standardmaessig ausgeblendet werden, mit Option "Show generic suggestions".

      Drittens: Bei Pattern-Vorschlaegen sollte die KI 1-3 konkrete Belegstellen aus den Quelldaten anfuehren ("Vorschlag basiert auf den E-Mails vom 14.2. und 03.4. an Kunde X").

      Ist das umsetzbar? Wir wuerden uns ueber eine Roadmap-Notiz freuen.

      Beste Gruesse
      Klara Lang
      Lang Engineering

