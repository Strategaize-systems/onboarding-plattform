    from: "h.dietrich@dietrich-praezision.de"
    to: "immo@bellaerts.de"
    date: "2026-05-20"
    body: |
      Sehr geehrter Herr Bellaerts,

      ich melde mich heute mit einer Erfolgsgeschichte, an der Strategaize einen erheblichen Anteil hat.

      Sie erinnern sich: Im Sommer 2025 habe ich begonnen, mein Lebenswerk in Strategaize zu strukturieren. Vier Jahrzehnte Praezisions-Werkzeugbau, 89 Mitarbeiter, ueber 400 dokumentierte Kundenbeziehungen, viele davon mit Sondervereinbarungen, die nirgendwo offiziell festgehalten waren.

      Anfang dieses Jahres hat sich ein strategischer Kaeufer gemeldet, ein boersennotierter Mittelstaendler aus dem benachbarten Segment. Im April und Mai lief die Due Diligence. Drei Punkte aus diesem Prozess moechte ich Ihnen weitergeben:

      Erstens: Die strukturierte Strategaize-Wissensbasis wurde vom Kaeufer als ungewoehnlich detailliert und vor allem als veraeusserbares Asset bewertet. In der Verkaufsverhandlung wurde explizit ein Aufschlag begruendet mit "dokumentierte Wissens-Uebertragbarkeit nach dem Closing reduziert das Integrations-Risiko". Mein Berater Dr. Eichinger schaetzte den Aufschlag auf rund 1.4 Mio EUR vom finalen Kaufpreis (8 Prozent).

      Zweitens: Mein Verbleib im Unternehmen wurde von 36 Monaten auf 18 Monate verkuerzt, weil mein Wissen ueber die Mandanten-Strategaize-Sicht "in einer Weise dokumentiert ist, die einen schnelleren Transfer ermoeglicht" (Originalformulierung aus dem Letter of Intent).

      Drittens: Der Datenraum-Prozess war deutlich entspannter als bei vergleichbaren Transaktionen meiner Berater-Kollegen. Strukturierte Information war auf Knopfdruck abrufbar.

      Sie duerfen diese Geschichte gerne anonymisiert in Ihrer Kommunikation verwenden. Wenn Sie eine namentliche Referenz brauchen, melden Sie sich.

      Vielen Dank fuer das Produkt und die Begleitung.

      Mit freundlichsten Gruessen
      Heinrich Dietrich

