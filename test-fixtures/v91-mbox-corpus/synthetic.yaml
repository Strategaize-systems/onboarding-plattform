    expected_pattern: "Customer-Feedback UI-Klarheit Onboarding-Schritt 4 (Pattern-Hierarchie unverstaendlich) + konkreter Verbesserungs-Vorschlag"
    reasoning: "Konkretes UI-Feedback mit Vorschlag. Wertvoll fuer Produktentwicklung und zeigt typische User-Verstaendnis-Huerden."
    subject: "Feedback Onboarding Schritt 4 — Pattern-Hierarchie"
    from: "n.gruber@gruber-elektro.de"
    to: "immo@bellaerts.de"
    date: "2026-04-28"
    body: |
      Hallo Herr Bellaerts,

      ich melde mich, weil ich beim Onboarding meiner Frau (uebernimmt nach und nach die kaufmaennische Leitung) gemerkt habe, dass der vierte Schritt in der Einrichtung deutlich unklarer ist als die anderen drei.

      Konkret: Im Schritt "Pattern-Hierarchie definieren" wird der User aufgefordert, eine Top-Level-Achse und Sub-Achsen zu definieren. Das Konzept "Pattern" ist fuer jemanden ohne Software-Hintergrund nicht greifbar. Meine Frau hat fast 20 Minuten gebraucht, bis sie verstanden hat, dass damit so etwas wie "Kategorien" oder "Themenfelder" gemeint ist.

      Mein konkreter Vorschlag:

      Den Begriff "Pattern" in der Benutzeroberflaeche durch "Themenfeld" oder "Wissensgebiet" ersetzen — zumindest im Onboarding. In der spaeteren Power-User-Sicht koennt ihr "Pattern" beibehalten, aber im Erstkontakt ist es ein unnoetiges Bremsklotz.

      Zusaetzlich waere ein 30-Sekunden-Erklaer-Video an dieser Stelle Gold wert. Idealerweise mit einem konkreten Beispiel — etwa eine Handwerksfirma, die "Kundenbeziehungen", "Lieferanten-Konditionen" und "Auftragsbearbeitung" als drei Themenfelder definiert.

      Drei der vier Onboarding-Schritte sind im Uebrigen exzellent — gerade der erste Schritt mit dem KI-Interview ist hervorragend.

      Beste Gruesse
      Norbert Gruber
      Gruber Elektro GmbH

