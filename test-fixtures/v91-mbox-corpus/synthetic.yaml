  - id: "011"
    expected_classification: valuable
    expected_pattern: "Vendor-Discussion Coolify-Kapazitaets-Planung (Container-Limits Hetzner CCX33, Cost-Tradeoff Up-Scaling vs. Hetzner-Bare-Metal)"
    reasoning: "Konkrete technische Entscheidung mit Cost-Impact (~150 EUR/Monat). Architektur-Pattern direkt wiederverwendbar fuer V10+."
    subject: "Re: Coolify Resource Usage — Recommendation zur naechsten Stufe"
    from: "alex@coolify.io"
    to: "immo@bellaerts.de"
    date: "2026-04-18"
    body: |
      Hi Immo,

      thanks for the detailed monitoring data you sent over. I had a look at your current Coolify instance and the resource utilisation pattern of the last 30 days.

      Quick summary of what I see:

      Your CCX33 (8 vCPU / 32 GB RAM) is running comfortably at 35-45 percent CPU average, but peak utilisation during your nightly cron jobs and Bedrock pre-processing reaches 78-82 percent for roughly 90 minutes. Memory is steady at 21 GB, with the supabase-db container being the largest consumer.

      My recommendation depends on your 6-month outlook:

      Option A — stay on CCX33: works fine until you cross roughly 4-5 active customers running parallel onboarding flows. The bottleneck will be Bedrock-API-throughput, not Coolify itself.

      Option B — upgrade to CCX43 (16 vCPU / 64 GB RAM): ~150 EUR more per month, gives you headroom for 12-15 active customers plus comfortable cron-job parallelism.

      Option C — split workloads: keep the app+supabase on CCX33, move Bedrock-pre-processing and cron-workers to a dedicated CX42. Approximately same cost as Option B but better isolation if the worker crashes.

      My honest take: stay on CCX33 until you cross 3 paying customers. Then go straight to Option C — the isolation argument becomes important the moment one customer's nightly job impacts another customer's interactive session.

      Happy to jump on a call if helpful.

      Best,
      Alex

