    from: "f.lindemann@gmail.com"
    to: "immo@bellaerts.de"
    date: "2026-05-15"
    body: |
      Sehr geehrter Herr Bellaerts,

      ich habe Ihre Roadmap fuer den Strategaize-Steuerberater-Vertriebskanal mit grossem Interesse gelesen — die Verbindung von Beratungs-Workflow und Software-Tooling ist genau die Schnittstelle, an der ich seit Jahren arbeite.

      Mein Hintergrund ist ungewoehnlich: Ich bin seit 11 Jahren bestellter Steuerberater, war 6 Jahre Partner einer mittelstaendischen Kanzlei in Frankfurt mit Fokus auf Nachfolgeberatung. Parallel habe ich vor 4 Jahren angefangen, eigene kleine Tools fuer unsere Kanzlei zu bauen — Python, ein paar Next.js-Frontends, mittlerweile auch Bedrock-Anbindung. Aus diesen Tools ist letztes Jahr ein eigenes Mini-SaaS entstanden (3 Kanzlei-Kunden, ca. 2.400 EUR ARR — bewusst klein gehalten, um zu lernen).

      Warum Strategaize: Sie loesen das Problem, das ich in den letzten 11 Jahren bei nahezu jedem Nachfolge-Mandat beobachtet habe — der Inhaber hat das Wissen ueber sein Unternehmen, kann es aber nicht uebertragen. Steuerberater haben dafuer kein Tool an der Hand, und Beratung allein loest das Problem nicht.

      Was ich Strategaize anbieten kann: Tiefe Expertise im Mandanten-Beratungsprozess, ein direktes Netzwerk in 40-60 Kanzleien (mein Berufsverband ist aktiv), und genug Tech-Verstaendnis, um sowohl in Sales-Gespraechen als auch in Produkt-Diskussionen Sinnvolles beizutragen.

      Rolle: Offen — von Channel-Lead bis Founders-Associate. Vollzeit, Teilzeit, Beratungs-Mandat — kein Dogma.

      Ueber ein erstes Gespraech wuerde ich mich sehr freuen.

      Mit besten Gruessen
      Felix Lindemann

