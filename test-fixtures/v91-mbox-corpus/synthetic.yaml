      Sehr geehrter Herr Bellaerts,

      mein Name ist Reinhard Lederer, ich bin Geschaeftsfuehrer des Steuerberaterverbands Bayern. Ueber gemeinsame Kontakte (zuletzt ueber Frau Schaefer von Ihrem Beirat) ist mir Strategaize ein Begriff geworden, und ich wollte mich mit Ihnen vernetzen.

      Wir beobachten in unserem Verband eine deutliche Veraenderung: Nachfolge-Beratung wird fuer unsere knapp 4.200 Mitglieder zu einem strategischen Beratungsfeld, in dem klassische Steuer-Werkzeuge nicht ausreichen. Wir spueren das in den Anfragen unserer Mitglieder nach Weiterbildungs-Angeboten, in den Pruefungs-Schwerpunkten beim Berufsexamen, und in den Themen, die unsere Mitglieder auf unseren Jahres-Tagungen sehen wollen.

      Konkret koennte ich mir vorstellen — und damit kommt der eigentliche Anlass meiner Mail — dass Strategaize ein Thema fuer unseren Steuerberatertag Bayern 2026 ist. Das ist unsere Jahres-Hauptveranstaltung mit typischerweise 800-1.000 Teilnehmern aus ganz Bayern. Wir suchen jaehrlich zwei bis drei Vortraege im Schwerpunkt "Zukunfts-Themen der Beratung", und die strukturierte Nachfolge-Vorbereitung mit Software-Unterstuetzung ist ein Format, das wir bisher nicht abgebildet haben.

      Die Veranstaltung findet vom 22. bis 23. Oktober 2026 in Nuernberg statt. Das Programm wird Mitte Juli final festgelegt — entsprechend muesste eine grundsaetzliche Bereitschaftserklaerung Ihrerseits bis Ende Juni vorliegen.

      Waeren Sie offen fuer ein Erstgespraech in den naechsten 2-3 Wochen? Ich wuerde dann gerne klaeren, wie ein passender Vortrags-Slot aussehen koennte (typischerweise 45 Minuten plus Q&A), und welche Form von Aussteller-Praesenz fuer Strategaize sinnvoll waere.

      Mit besten Gruessen
      Reinhard Lederer
      Steuerberaterverband Bayern, Geschaeftsfuehrer
