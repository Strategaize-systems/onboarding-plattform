  - id: "015"
    expected_classification: valuable
    expected_pattern: "Strategic-Decision Beirat-Diskussion zu Pricing-Modell (Pro-Mandant-Lizenz vs. Kanzlei-Flatrate) mit konkretem Vor-Nachteils-Argument"
    reasoning: "Strategische Beirats-Diskussion mit konkreten Argumentations-Linien. Direkt wertvoll fuer Pricing-Entscheidungen und Markt-Strategie."
    subject: "Pricing-Modell StB-Kanzlei — meine Sicht"
    from: "konstantin@beirat-konstantin.de"
    to: "immo@bellaerts.de"
    date: "2026-04-25"
    body: |
      Lieber Immo,

      ich habe ueber das Pricing-Modell-Thema fuer die StB-Kanzlei-Lizenz nachgedacht, ueber das wir Donnerstag gesprochen haben. Hier meine Sicht.

      Du erwaegst zwei Modelle:

      Modell A — Pro-Mandant-Lizenz: 197 EUR/Monat pro aktivem Mandanten in Strategaize, Kanzlei zahlt fuer die Read-Only-Sicht zusaetzlich 99 EUR/Monat Grundgebuehr.

      Modell B — Kanzlei-Flatrate: 1.490 EUR/Monat fuer die gesamte Kanzlei, unbegrenzte Mandanten, fuer Mandanten ist die Nutzung kostenlos waehrend des Beratungs-Prozesses.

      Meine Empfehlung: Modell B, mit Caveat.

      Pro-Argumente Modell B:
      - Einfacher zu verkaufen — eine Zahl, klare Kalkulationsbasis fuer die Kanzlei
      - Skaliert mit dem Beratungs-Volumen, nicht mit der Mandanten-Aktivitaet (was du eh nicht sauber kontrollieren kannst)
      - Kein Provisionskonflikt mit §9 StBerG — Kanzlei zahlt fuer ein Tool, nicht fuer Empfehlungen
      - Mandanten-Akzeptanz hoeher, da fuer den Mandanten kostenlos

      Caveat: Du musst sehr klar definieren, was passiert, wenn der Mandant nach Beendigung der Beratung Strategaize weiter nutzen moechte. Vorschlag: dann konvertiert er auf eine normale Direkt-Lizenz (Standard 297 EUR oder Professional 497 EUR/Monat), die Kanzlei bekommt keine Provision (StBerG), aber einen Sachleistungs-Bonus (z.B. Schulungs-Credits oder Marketing-Materialien). Das ist sauber und macht den Funnel langfristig nachhaltig.

      Risiko Modell A waere, dass die Kanzleien als Gatekeeper das Onboarding bremsen, weil jeder Mandant eine zusaetzliche monatliche Position auf der Rechnung ist.

      Lass uns das in der naechsten Beiratssitzung am 8.5. final entscheiden.

      Beste Gruesse
      Konstantin

