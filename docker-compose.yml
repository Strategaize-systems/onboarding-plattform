version: "3.8"

# StrategAIze Kundenplattform v1.0
# Self-hosted auf Hetzner via Coolify + Docker Compose
# Kein Vercel, kein Supabase Cloud, keine externen Dienste
#
# Netzwerk: Nur Port 80/443 nach außen (via Coolify/Caddy).
# Alle internen Services kommunizieren über strategaize-net.
# Supabase Studio: kein Port-Mapping nach außen (SSH-Tunnel nutzen).

networks:
  strategaize-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
  jitsi-web-config:
    driver: local
  jitsi-web-transcripts:
    driver: local
  jitsi-prosody-config:
    driver: local
  jitsi-prosody-plugins:
    driver: local
  jitsi-jicofo-config:
    driver: local
  jitsi-jvb-config:
    driver: local
  jitsi-jibri-config:
    driver: local
  jitsi-recordings:
    driver: local

services:

  # ============================================================
  # WEB APPLICATION
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Internal URL for server-side Supabase calls (middleware, server actions)
      SUPABASE_URL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # AWS Bedrock for KI-Chat in Questionnaire (same credentials as worker)
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      LLM_MODEL: ${LLM_MODEL:-eu.anthropic.claude-sonnet-4-20250514-v1:0}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_started
      supabase-kong:
        condition: service_started
    networks:
      - strategaize-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # WORKER — Knowledge Unit Condensation (Analyst+Challenger Loop)
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Supabase (internal URL — worker talks to Kong directly)
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # AWS Bedrock (eu-central-1 Frankfurt — DSGVO-konform)
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      LLM_MODEL: ${LLM_MODEL:-eu.anthropic.claude-sonnet-4-20250514-v1:0}
      # Embedding (Amazon Titan V2, same region as LLM)
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-titan}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_REGION: ${EMBEDDING_REGION:-eu-central-1}
      # Worker config
      AI_WORKER_POLL_MS: ${AI_WORKER_POLL_MS:-2000}
      AI_MIN_ITERATIONS: ${AI_MIN_ITERATIONS:-2}
      AI_MAX_ITERATIONS: ${AI_MAX_ITERATIONS:-8}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-kong:
        condition: service_started
    networks:
      - strategaize-net

  # ============================================================
  # SUPABASE STACK
  # ============================================================

  supabase-db:
    build:
      context: ./sql
      dockerfile: Dockerfile.db
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_USER: postgres
      PGPORT: 5432
    networks:
      - strategaize-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  supabase-auth:
    image: supabase/gotrue:v2.160.0
    restart: unless-stopped
    expose:
      - "9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_APP_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_APP_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      # Kein Self-Signup
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # SMTP für Invite-Emails
      API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL}/auth/v1
      GOTRUE_API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL}/auth/v1
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-unused}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-unused}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-noreply@example.com}
      GOTRUE_SMTP_SENDER_NAME: StrategAIze
      GOTRUE_MAILER_SUBJECTS_INVITE: "Ihre Einladung zur StrategAIze Plattform"
      GOTRUE_MAILER_TEMPLATES_INVITE: "http://app:3000/auth-templates/invite.html"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_LOG_LEVEL: warn
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - strategaize-net

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - strategaize-net

  supabase-storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      UPLOAD_FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
      UPLOAD_FILE_SIZE_LIMIT_STANDARD: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    networks:
      - strategaize-net

  supabase-realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_SECRET}
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET}
      PORT: 4000
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      APP_NAME: strategaize-realtime
      RLIMIT_NOFILE: "1048576"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - strategaize-net

  supabase-kong:
    build:
      context: ./config
      dockerfile: Dockerfile.kong
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_LOG_LEVEL: warn
      # Required: Kong needs these to authenticate API consumers (anon + service_role)
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
    networks:
      - strategaize-net

  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - strategaize-net

  supabase-studio:
    # NICHT öffentlich — kein Port-Mapping nach außen!
    # Zugang via SSH-Tunnel: ssh -L 3001:supabase-studio:3000 user@hetzner-vm
    image: supabase/studio:20241028-a265374
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: StrategAIze
      DEFAULT_PROJECT_NAME: Kundenplattform
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LOGFLARE_API_KEY: ""
      LOGFLARE_URL: http://supabase-analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "false"
    depends_on:
      supabase-meta:
        condition: service_started
    networks:
      - strategaize-net

  # ============================================================
  # OPTIONAL: DIFY (deaktiviert in MVP-1)
  # Zum Aktivieren: Kommentierung entfernen
  # ============================================================
  # dify:
  #   image: langgenius/dify-api:0.15.0
  #   restart: unless-stopped
  #   expose:
  #     - "5001"
  #   environment:
  #     DIFY_API_KEY: ${DIFY_API_KEY}
  #     DB_HOST: supabase-db
  #     SECRET_KEY: ${DIFY_SECRET_KEY}
  #   depends_on:
  #     supabase-db:
  #       condition: service_healthy
  #   networks:
  #     - strategaize-net

  # ============================================================
  # WHISPER — Speech-to-Text (Self-hosted, DSGVO-konform, Default: medium)
  # ============================================================
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-medium}
      - ASR_ENGINE=openai_whisper
    networks:
      - strategaize-net

  # ============================================================
  # JITSI MEET — Video Conferencing (V3 Dialogue-Mode)
  # Self-hosted, JWT-Auth, Recording via Jibri
  # Referenz: Business System docker-compose.yml (stable-9258)
  # Coolify-UUID: bwkg80w04wgccos48gcws8cs
  # ============================================================

  jitsi-web:
    image: jitsi/web:stable-9258
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.docker.network=bwkg80w04wgccos48gcws8cs"
      - "traefik.http.services.jitsi-web-svc.loadbalancer.server.port=80"
      - "traefik.http.routers.http-0-bwkg80w04wgccos48gcws8cs-jitsi-web.service=jitsi-web-svc"
      - "traefik.http.routers.https-0-bwkg80w04wgccos48gcws8cs-jitsi-web.service=jitsi-web-svc"
    environment:
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      AUTH_TYPE: jwt
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-onboarding}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_APP_ID:-onboarding}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_APP_ID:-onboarding}
      PUBLIC_URL: https://${JITSI_DOMAIN:-meet-onboarding.strategaizetransition.com}
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      ENABLE_LETSENCRYPT: "0"
      ENABLE_XMPP_WEBSOCKET: "1"
      ENABLE_RECORDING: "1"
      ENABLE_FILE_RECORDING_SERVICE: "1"
      ENABLE_FILE_RECORDING_SERVICE_SHARING: "0"
      TZ: Europe/Berlin
    volumes:
      - jitsi-web-config:/config
      - jitsi-web-transcripts:/usr/share/jitsi-meet/transcripts
    depends_on:
      - jitsi-prosody
    networks:
      - strategaize-net

  jitsi-prosody:
    image: jitsi/prosody:stable-9258
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    environment:
      AUTH_TYPE: jwt
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      ENABLE_RECORDING: "1"
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-onboarding}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_APP_ID:-onboarding}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_APP_ID:-onboarding}
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD}
      JICOFO_COMPONENT_SECRET: ${JITSI_JICOFO_COMPONENT_SECRET}
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD}
      JIBRI_RECORDER_USER: recorder
      JIBRI_RECORDER_PASSWORD: ${JITSI_JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: jibri
      JIBRI_XMPP_PASSWORD: ${JITSI_JIBRI_XMPP_PASSWORD}
      TZ: Europe/Berlin
    volumes:
      - jitsi-prosody-config:/config
      - jitsi-prosody-plugins:/prosody-plugins-custom
    networks:
      strategaize-net:
        aliases:
          - ${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}

  jitsi-jicofo:
    image: jitsi/jicofo:stable-9258
    restart: unless-stopped
    environment:
      AUTH_TYPE: jwt
      ENABLE_AUTH: "1"
      ENABLE_RECORDING: "1"
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      JICOFO_COMPONENT_SECRET: ${JITSI_JICOFO_COMPONENT_SECRET}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD}
      JVB_BREWERY_MUC: jvbbrewery
      JIBRI_BREWERY_MUC: jibribrewery
      JIBRI_PENDING_TIMEOUT: "90"
      TZ: Europe/Berlin
    volumes:
      - jitsi-jicofo-config:/config
    depends_on:
      - jitsi-prosody
    networks:
      - strategaize-net

  jitsi-jvb:
    image: jitsi/jvb:stable-9258
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD}
      JVB_BREWERY_MUC: jvbbrewery
      JVB_PORT: "10000"
      JVB_STUN_SERVERS: meet-jit-si-turnrelay.jitsi.net:443
      TZ: Europe/Berlin
    volumes:
      - jitsi-jvb-config:/config
    depends_on:
      - jitsi-prosody
    networks:
      - strategaize-net

  jitsi-jibri:
    image: jitsi/jibri:stable-9258
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/snd:/dev/snd
    environment:
      PUBLIC_URL: https://${JITSI_DOMAIN:-meet-onboarding.strategaizetransition.com}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JIBRI_RECORDER_USER: recorder
      JIBRI_RECORDER_PASSWORD: ${JITSI_JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: jibri
      JIBRI_XMPP_PASSWORD: ${JITSI_JIBRI_XMPP_PASSWORD}
      JIBRI_BREWERY_MUC: jibribrewery
      JIBRI_RECORDING_DIR: /recordings
      JIBRI_STRIP_DOMAIN_JID: muc
      JIBRI_LOGS_DIR: /config/logs
      DISPLAY: ":0"
      TZ: Europe/Berlin
    volumes:
      - jitsi-jibri-config:/config
      - jitsi-recordings:/recordings
    depends_on:
      - jitsi-prosody
    networks:
      - strategaize-net
